name: Check case report

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "case-report.md"
      - "check_report.py"
      - ".github/workflows/check-report.yml"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      - name: Run report checker
        id: check
        shell: bash
        run: |
          set +e
          python3 check_report.py > report-check.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment result on pull request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- case-report-check -->';
            const status = Number(`${{ steps.check.outputs.status }}`);
            const result = fs.readFileSync('report-check.txt', 'utf8').trim();
            const title = status === 0
              ? 'case-report.md 자동 점검: 통과'
              : 'case-report.md 자동 점검: 보완 필요';
            const body = `${marker}
            ## ${title}

            \`\`\`text
            ${result}
            \`\`\`

            커밋: \`${context.sha.slice(0, 7)}\`
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.data.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail when required checks are missing
        if: steps.check.outputs.status != '0'
        run: exit 1
